<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Super Admin Login — Hotel SLA</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <style>
    body { background:linear-gradient(135deg,#1e1b4b 0%,#4f46e5 100%); min-height:100vh; display:flex; align-items:center; justify-content:center; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
    .card { border:0; border-radius:1rem; box-shadow:0 20px 60px rgba(0,0,0,.3); width:100%; max-width:400px; overflow:hidden; }
    .card-header { background:#1e1b4b; padding:2rem; text-align:center; }
    .icon-wrap { width:64px; height:64px; background:rgba(255,255,255,.1); border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto .9rem; font-size:1.75rem; color:#fbbf24; }
    .form-label { font-size:.8rem; font-weight:600; color:#374151; }
    .input-group-text { background:#f8fafc; border-right:0; color:#64748b; border-radius:.5rem 0 0 .5rem; }
    .form-control { border-radius:0 .5rem .5rem 0; }
    .form-control:focus { border-color:#4f46e5; box-shadow:0 0 0 3px rgba(79,70,229,.12); }
    .btn-signin { background:#4f46e5; border:0; border-radius:.5rem; padding:.7rem; font-weight:600; }
  </style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <div class="icon-wrap"><i class="bi bi-shield-fill-check"></i></div>
    <h4 class="text-white fw-bold mb-1">Super Admin</h4>
    <p class="text-secondary mb-0" style="font-size:.85rem">Hotel SLA Platform</p>
  </div>
  <div class="card-body p-4">
    {% if error %}
    <div class="alert alert-danger d-flex align-items-center gap-2 py-2 mb-3">
      <i class="bi bi-exclamation-circle-fill"></i>
      <span style="font-size:.85rem">{{ error }}</span>
    </div>
    {% endif %}
    <form method="post" action="/admin/login">
      <div class="mb-3">
        <label class="form-label">Admin Email</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input type="email" name="email" class="form-control" placeholder="admin@company.com" required autocomplete="email"/>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" id="pwd" class="form-control" placeholder="••••••••" required/>
          <button type="button" class="btn btn-outline-secondary" onclick="togglePwd()" tabindex="-1">
            <i class="bi bi-eye" id="pwdIco"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-signin btn-primary w-100">
        <i class="bi bi-shield-lock me-2"></i>Sign In as Super Admin
      </button>
    </form>
  </div>
</div>
<script>
  function togglePwd() {
    const i = document.getElementById("pwd"), ic = document.getElementById("pwdIco");
    i.type = i.type === "password" ? "text" : "password";
    ic.className = i.type === "password" ? "bi bi-eye" : "bi bi-eye-slash";
  }
</script>
</body>
</html>
