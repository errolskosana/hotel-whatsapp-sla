<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{% block title %}Super Admin — Hotel SLA{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <style>
    :root { --sb-bg:#1e1b4b; --sb-border:#312e81; --sb-text:#a5b4fc; --sb-hover:#312e81; --sb-active:#4f46e5; --sb-w:240px; }
    body { background:#f0f4f8; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
    .sidebar { width:var(--sb-w); min-height:100vh; background:var(--sb-bg); position:fixed; top:0; left:0; z-index:1000; display:flex; flex-direction:column; }
    .sb-brand { padding:1.25rem 1rem; border-bottom:1px solid var(--sb-border); }
    .sb-brand .brand-name { color:#fff; font-size:1rem; font-weight:700; }
    .sb-brand .brand-sub  { color:#6366f1; font-size:.72rem; }
    .sb-nav { list-style:none; padding:.6rem 0; margin:0; flex:1; }
    .sb-nav li { padding:.15rem .65rem; }
    .sb-link { display:flex; align-items:center; gap:.6rem; padding:.58rem .85rem; color:var(--sb-text); text-decoration:none; border-radius:.45rem; font-size:.855rem; font-weight:500; transition:background .13s,color .13s; }
    .sb-link i { font-size:.95rem; min-width:1.15rem; }
    .sb-link:hover { background:var(--sb-hover); color:#e0e7ff; }
    .sb-link.active { background:var(--sb-active); color:#fff; }
    .sb-footer { padding:.85rem .75rem; border-top:1px solid var(--sb-border); }
    .sb-user { display:flex; align-items:center; gap:.65rem; margin-bottom:.65rem; }
    .sb-avatar { width:34px; height:34px; border-radius:50%; background:#4f46e5; color:#fff; display:flex; align-items:center; justify-content:center; font-size:.75rem; font-weight:700; flex-shrink:0; }
    .sb-email { color:#a5b4fc; font-size:.75rem; }
    .main-wrap { margin-left:var(--sb-w); display:flex; flex-direction:column; min-height:100vh; }
    .topbar { height:58px; background:#fff; border-bottom:1px solid #e2e8f0; padding:0 1.75rem; display:flex; align-items:center; gap:1rem; position:sticky; top:0; z-index:100; }
    .topbar-title { font-size:1.1rem; font-weight:700; color:#1e1b4b; margin:0; }
    .content { padding:1.6rem 1.75rem; flex:1; }
    .data-card { background:#fff; border-radius:.75rem; border:1px solid #e2e8f0; overflow:hidden; }
    .data-card-hdr { padding:1rem 1.4rem; border-bottom:1px solid #f1f5f9; display:flex; align-items:center; justify-content:space-between; }
    .data-card-hdr h6 { margin:0; font-weight:700; color:#1e1b4b; font-size:.92rem; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
<div class="d-flex">
  <nav class="sidebar">
    <div class="sb-brand">
      <div class="d-flex align-items-center gap-2 mb-1">
        <i class="bi bi-shield-fill-check text-warning" style="font-size:1.3rem"></i>
        <span class="brand-name">Super Admin</span>
      </div>
      <span class="brand-sub">Hotel SLA Platform</span>
    </div>
    <ul class="sb-nav">
      <li>
        <a href="/admin/hotels" class="sb-link {% if '/hotels' in request.url.path %}active{% endif %}">
          <i class="bi bi-building-fill"></i> Hotels
        </a>
      </li>
      <li>
        <a href="/admin/admins" class="sb-link {% if '/admins' in request.url.path %}active{% endif %}">
          <i class="bi bi-person-badge-fill"></i> Admins
        </a>
      </li>
    </ul>
    <div class="sb-footer">
      {% if admin %}
      <div class="sb-user">
        <div class="sb-avatar">{{ admin.email[:2].upper() }}</div>
        <div class="sb-email">{{ admin.email }}</div>
      </div>
      <form action="/admin/logout" method="post">
        <button class="btn btn-sm w-100" style="background:#312e81;color:#a5b4fc;border:0">
          <i class="bi bi-box-arrow-right me-1"></i>Sign Out
        </button>
      </form>
      {% endif %}
    </div>
  </nav>

  <div class="main-wrap w-100">
    <div class="topbar">
      <h1 class="topbar-title">{% block page_title %}Admin{% endblock %}</h1>
      <div class="ms-auto">
        <span class="badge" style="background:#ede9fe;color:#4f46e5;font-size:.7rem">
          <i class="bi bi-shield-check me-1"></i>Super Admin Portal
        </span>
      </div>
    </div>
    <div class="content">
      {% block content %}{% endblock %}
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
