<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Login — Hotel SLA</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f0f4f8; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #fff; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,.12); padding: 2.5rem 2rem; width: 100%; max-width: 380px; }
    h1 { font-size: 1.5rem; margin-bottom: .25rem; color: #1a1a2e; }
    p.sub { font-size: .85rem; color: #666; margin-bottom: 1.5rem; }
    label { font-size: .82rem; font-weight: 600; display: block; margin-bottom: 3px; color: #444; }
    input { border: 1px solid #d1d5db; border-radius: 6px; padding: 8px 11px; font-size: .9rem; width: 100%; margin-bottom: 1rem; }
    input:focus { outline: 2px solid #2563eb; border-color: #2563eb; }
    button { width: 100%; padding: 10px; background: #2563eb; color: #fff; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; margin-top: .25rem; }
    button:hover { background: #1d4ed8; }
    .error { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; border-radius: 6px; padding: 9px 12px; font-size: .88rem; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Hotel SLA</h1>
    <p class="sub">Sign in to the staff dashboard</p>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="post" action="/login">
      <label for="hotel_id">Hotel ID (UUID)</label>
      <input id="hotel_id" name="hotel_id" type="text" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" required/>
      <label for="email">Email</label>
      <input id="email" name="email" type="email" placeholder="you@hotel.com" required/>
      <label for="password">Password</label>
      <input id="password" name="password" type="password" placeholder="••••••••" required/>
      <button type="submit">Sign in</button>
    </form>
  </div>
</body>
</html>
